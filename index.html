<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ファンタジーライフ</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b1f2a">
<meta name="description" content="採集→装備作成→強化→戦闘で遊ぶファンタジーライフ風ゲーム">

<!-- iOS（ホーム画面追加でアプリのように全画面起動） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ファンライフ">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- ヘッダー：プレイヤーステータス -->
  <header id="status-bar">
    <div class="stat">
      <span class="stat-label">Lv</span>
      <span id="stat-level">1</span>
    </div>
    <div class="stat hp-stat">
      <span class="stat-label">HP</span>
      <div class="bar"><div id="hp-fill" class="bar-fill"></div></div>
      <span id="stat-hp">30/30</span>
    </div>
    <div class="stat mp-stat">
      <span class="stat-label">MP</span>
      <div class="bar"><div id="mp-fill" class="bar-fill mp"></div></div>
      <span id="stat-mp">10/10</span>
    </div>
    <div class="stat exp-stat">
      <span class="stat-label">EXP</span>
      <div class="bar"><div id="exp-fill" class="bar-fill exp"></div></div>
      <span id="stat-exp">0/10</span>
    </div>
    <div class="stat"><span class="stat-label">⚔</span><span id="stat-atk">5</span></div>
    <div class="stat"><span class="stat-label">🛡</span><span id="stat-def">2</span></div>
    <div class="stat"><span class="stat-label">💰</span><span id="stat-gold">0</span></div>
  </header>

  <!-- タブナビ -->
  <nav id="tabs">
    <button class="tab-btn active" data-tab="explore">🗺 探索</button>
    <button class="tab-btn" data-tab="gather">⛏ 採集</button>
    <button class="tab-btn" data-tab="craft">🔨 作成</button>
    <button class="tab-btn" data-tab="equip">🎽 装備</button>
    <button class="tab-btn" data-tab="shop">🛒 店</button>
    <button class="tab-btn" data-tab="bag">🎒 持ち物</button>
  </nav>

  <main id="content">
    <!-- 探索（エリア選択＆戦闘） -->
    <section id="tab-explore" class="tab-panel active">
      <h2>探索するエリアを選ぶ</h2>
      <div id="area-list" class="area-list"></div>
      <div id="battle" class="battle hidden"></div>
    </section>

    <!-- 採集 -->
    <section id="tab-gather" class="tab-panel">
      <h2>採集</h2>
      <p class="hint">エリアを選んで、木・石・鉱石から素材を集めよう。良い道具ほどたくさん採れる。</p>
      <div id="gather-area-list" class="chip-row"></div>
      <div id="gather-nodes" class="node-grid"></div>
    </section>

    <!-- 作成 -->
    <section id="tab-craft" class="tab-panel">
      <h2>作成</h2>
      <p class="hint">集めた素材で武器・防具・道具を作ろう。作れるものは緑色で表示される。</p>
      <div id="recipe-list" class="recipe-list"></div>
    </section>

    <!-- 装備 -->
    <section id="tab-equip" class="tab-panel">
      <h2>装備</h2>
      <div id="equip-slots" class="equip-slots"></div>
      <h3>所持している装備・道具</h3>
      <div id="owned-gear" class="gear-list"></div>
    </section>

    <!-- お店 -->
    <section id="tab-shop" class="tab-panel">
      <h2>道具屋</h2>
      <p class="hint">戦闘で稼いだゴールドで、回復アイテムや永続強化の種を買おう。アイテムは戦闘中に使える。</p>
      <h3>消耗品（戦闘中に使用）</h3>
      <div id="shop-consumable" class="recipe-list"></div>
      <h3>永続強化の種</h3>
      <div id="shop-perm" class="recipe-list"></div>
    </section>

    <!-- 持ち物 -->
    <section id="tab-bag" class="tab-panel">
      <h2>持ち物（素材）</h2>
      <div id="material-list" class="material-list"></div>
      <button id="reset-btn" class="danger-btn">最初からやり直す</button>
    </section>
  </main>

  <!-- ログ -->
  <div id="log"></div>
</div>

<!-- インストール案内（ホーム画面に追加） -->
<div id="install-bar" class="install-bar hidden">
  <span id="install-text">📲 ホーム画面に追加してアプリのように使えます</span>
  <button id="install-btn" class="install-go">追加</button>
  <button id="install-close" class="install-x" aria-label="閉じる">✕</button>
</div>

<script src="sprites.js"></script>
<script src="game.js"></script>
<script>
/* ---- PWA: Service Worker 登録 ---- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

/* ---- インストール案内 ---- */
(function () {
  const bar = document.getElementById("install-bar");
  const btn = document.getElementById("install-btn");
  const txt = document.getElementById("install-text");
  const closeBtn = document.getElementById("install-close");
  let deferredPrompt = null;
  const DISMISS_KEY = "fl-install-dismissed";

  const isStandalone =
    window.matchMedia("(display-mode: standalone)").matches ||
    window.navigator.standalone === true;
  const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const dismissed = localStorage.getItem(DISMISS_KEY) === "1";

  closeBtn.onclick = () => {
    bar.classList.add("hidden");
    localStorage.setItem(DISMISS_KEY, "1");
  };

  // Android / Chrome：ネイティブのインストールプロンプト
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!isStandalone && !dismissed) bar.classList.remove("hidden");
  });
  btn.onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    bar.classList.add("hidden");
  };

  // iOS：beforeinstallprompt 非対応のため手順を案内
  if (isiOS && !isStandalone && !dismissed) {
    btn.classList.add("hidden");
    txt.innerHTML = "📲 共有ボタン <b>􀈂</b> →「ホーム画面に追加」でアプリになります";
    bar.classList.remove("hidden");
  }

  window.addEventListener("appinstalled", () => bar.classList.add("hidden"));
})();
</script>
</body>
</html>
